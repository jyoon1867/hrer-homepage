<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1C2E"/>
      <stop offset="1" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00B893"/>
      <stop offset="1" stop-color="#4C6EF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#00B893" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B893" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- HRer logo mark -->
  <g transform="translate(80, 80)">
    <rect width="68" height="68" rx="16" fill="url(#accent)"/>
    <text x="34" y="47" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="40" font-weight="900" fill="#fff" text-anchor="middle">H</text>
  </g>
  <text x="170" y="130" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="28" font-weight="700" fill="#fff" letter-spacing="-0.5">HRer</text>

  <!-- Main title -->
  <text x="80" y="310" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="72" font-weight="900" fill="#fff" letter-spacing="-3">법 조문이 아니라</text>
  <text x="80" y="400" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="72" font-weight="900" fill="url(#accent)" letter-spacing="-3">실제 판정 데이터로 답합니다</text>

  <!-- Subtitle -->
  <text x="80" y="475" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.65)" letter-spacing="-0.5">노동위원회 판정례 9만 건 · 판례 1.4만 건 기반</text>

  <!-- Service chips -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="160" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(0,184,147,0.4)" stroke-width="1.5"/>
    <text x="80" y="31" font-family="-apple-system,sans-serif" font-size="17" font-weight="700" fill="#00B893" text-anchor="middle">노무 자문</text>

    <rect x="175" y="0" width="160" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(0,184,147,0.4)" stroke-width="1.5"/>
    <text x="255" y="31" font-family="-apple-system,sans-serif" font-size="17" font-weight="700" fill="#00B893" text-anchor="middle">부당해고</text>

    <rect x="350" y="0" width="180" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(0,184,147,0.4)" stroke-width="1.5"/>
    <text x="440" y="31" font-family="-apple-system,sans-serif" font-size="17" font-weight="700" fill="#00B893" text-anchor="middle">괴롭힘 조사</text>

    <rect x="545" y="0" width="160" height="48" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(76,110,245,0.4)" stroke-width="1.5"/>
    <text x="625" y="31" font-family="-apple-system,sans-serif" font-size="17" font-weight="700" fill="#4C6EF5" text-anchor="middle">인사평가</text>
  </g>

  <!-- URL -->
  <text x="1120" y="590" font-family="-apple-system,sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="end">hrer.kr</text>
</svg>
