<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>챗봇 관리 — HRer 내부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--mint:#00B893;--blue:#4C6EF5;--dark:#191919;--gray:#737373;--gray2:#A3A3A3;--border:#E5E7EB;--bg:#FAFAFA}
body{font-family:'Noto Sans KR',sans-serif;color:var(--dark);background:var(--bg);padding:40px 24px;line-height:1.6}
.wrap{max-width:1300px;margin:0 auto}
h1{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
.sub{color:var(--gray);font-size:14px;margin-bottom:24px}
.login{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--border);border-radius:14px;padding:32px}
.login h2{font-size:18px;margin-bottom:14px}
.login input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
.login input:focus{border-color:var(--mint)}
.login button{width:100%;padding:11px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.login .err{color:#DC2626;font-size:13px;margin-top:8px}
.kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px}
.kpi-card .n{font-size:28px;font-weight:900;color:var(--dark);letter-spacing:-0.8px}
.kpi-card .n.good{color:var(--mint)}
.kpi-card .n.bad{color:#DC2626}
.kpi-card .n.highlight{color:var(--blue)}
.kpi-card .l{font-size:12px;color:var(--gray);margin-top:4px}
.section{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}
.section h2{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.section h2 .cnt{font-size:12px;color:var(--gray);font-weight:500}
.list{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto}
.item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s}
.item:hover{border-color:var(--mint)}
.item .q{flex:1;font-weight:500;color:var(--dark);word-break:break-word}
.item .t{color:var(--gray2);font-size:11px;white-space:nowrap}
.item .b{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;margin-right:6px}
.item .b.up{background:#D1FAE5;color:#065F46}
.item .b.down{background:#FEE2E2;color:#991B1B}
.item .b.ai{background:#EEF2FF;color:#4338CA}
.item .b.faq{background:#F0FDF4;color:#065F46}
.item .b.esc{background:#FFFBEB;color:#B45309}
.item .b.handoff{background:#DBEAFE;color:#1E40AF}
.empty{text-align:center;color:var(--gray2);font-size:13px;padding:32px}
.actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{border-color:var(--mint);color:var(--mint)}
.btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
.btn.primary:hover{background:#333;color:#fff}
.btn.danger{border-color:#FCA5A5;color:#B91C1C}
.btn.danger:hover{background:#FEE2E2}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.kpi{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}}
a.home{display:inline-block;font-size:13px;color:var(--gray);margin-bottom:20px;text-decoration:none}
a.home:hover{color:var(--dark)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:14px;max-width:720px;width:100%;margin:auto;padding:26px 30px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal h3 button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}
.msg{padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.7;max-width:80%}
.msg.user{background:linear-gradient(135deg,#00B893,#4C6EF5);color:#fff;margin-left:auto;border-radius:14px 14px 4px 14px}
.msg.bot{background:#F3F4F6;border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.msg .who{font-size:10.5px;font-weight:700;color:var(--gray2);margin-bottom:3px;letter-spacing:0.5px}
.msg.user .who{color:rgba(255,255,255,0.8)}
.status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10.5px;font-weight:700}
.status.ok{background:#D1FAE5;color:#065F46}
.status.warn{background:#FEF3C7;color:#92400E}
.status.answered{background:#DBEAFE;color:#1E40AF}
.status.pending-answer{background:#FEF3C7;color:#92400E}
.answer-modal{max-width:920px}
.ans-order{background:#F7F9FC;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.7}
.ans-order strong{color:var(--dark)}
.ans-order .row{display:grid;grid-template-columns:100px 1fr;gap:4px;margin-bottom:6px}
.ans-order .row .k{color:var(--gray);font-size:12px}
.ans-q{padding:14px;background:#fff;border:1px dashed var(--border);border-radius:8px;margin-top:10px;white-space:pre-wrap;line-height:1.75;color:#333;font-size:13.5px}
.ch-tog{display:flex;gap:8px;margin-bottom:12px}
.ch-tog label{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;text-align:center;font-weight:600}
.ch-tog input{display:none}
.ch-tog input:checked + span{color:var(--mint)}
.ch-tog label:has(input:checked){border-color:var(--mint);background:#F0FDFA}
.ans-editor{width:100%;min-height:320px;padding:16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;line-height:1.8;resize:vertical;outline:none}
.ans-editor:focus{border-color:var(--mint)}
.ans-actions{display:flex;gap:10px;margin-top:12px;justify-content:flex-end;align-items:center}
.ans-actions .hint{color:var(--gray);font-size:12px;margin-right:auto}
.ans-saved{background:#F0FDF4;border:1px solid #BBF7D0;color:#065F46;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.ans-err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.ans-prev{background:#EEF2FF;border:1px solid #C7D2FE;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none;line-height:1.7}
.ai-draft-card{background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;line-height:1.75}
.ai-draft-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:700;color:#92400E}
.ai-draft-card .meta{font-size:11.5px;color:#A16207;font-weight:500}
.ai-draft-card .ai-body{background:#fff;border:1px solid #FCD34D;border-radius:6px;padding:12px 14px;max-height:280px;overflow-y:auto;white-space:pre-wrap;color:#333;font-size:13px;line-height:1.8}
.ai-draft-card .ai-cites{margin-top:8px;font-size:11.5px;color:#78350F}
.ai-draft-card .ai-cites strong{color:#92400E}
.ai-draft-card button{margin-top:8px;background:#fff;border:1px solid #F59E0B;color:#92400E;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.ai-draft-card button:hover{background:#FEF3C7}
.ai-draft-empty{font-size:12px;color:#A16207;padding:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="home">← 홈으로</a>
  <h1>챗봇 관리 대시보드</h1>
  <div class="sub" id="sub">서버 DB 기반 · 실시간 통계</div>

  <div id="login" class="login">
    <h2>🔒 관리자 인증</h2>
    <p style="font-size:13px;color:var(--gray);margin-bottom:14px">ADMIN_TOKEN을 입력하세요. (Vercel 환경변수에 등록된 값)</p>
    <input type="password" id="token-input" placeholder="토큰 입력" autocomplete="off">
    <button onclick="login()">로그인</button>
    <div class="err" id="login-err"></div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="kpi">
      <div class="kpi-card"><div class="n" id="k-sessions">-</div><div class="l">세션 수</div></div>
      <div class="kpi-card"><div class="n good" id="k-faq">-</div><div class="l">FAQ 매칭 (%)</div></div>
      <div class="kpi-card"><div class="n highlight" id="k-ai">-</div><div class="l">AI 답변</div></div>
      <div class="kpi-card"><div class="n bad" id="k-miss">-</div><div class="l">매칭 실패</div></div>
      <div class="kpi-card"><div class="n" id="k-handoff">-</div><div class="l">의뢰 전환</div></div>
    </div>

    <div class="actions">
      <button class="btn primary" onclick="refresh()">🔄 새로고침</button>
      <button class="btn" onclick="exportJSON()">📥 JSON 내보내기</button>
      <button class="btn danger" onclick="logout()">🔓 로그아웃</button>
    </div>

    <div class="grid2">
      <div class="section">
        <h2>❌ 매칭 실패 질문 <span class="cnt" id="miss-count"></span></h2>
        <div class="sub" style="font-size:12px;margin-bottom:10px">이 질문들을 <code>chatbot-data.json</code>의 FAQ로 추가하면 챗봇이 점점 똑똑해져요.</div>
        <div class="list" id="miss-list"></div>
      </div>
      <div class="section">
        <h2>💬 최근 세션 <span class="cnt" id="sess-count"></span></h2>
        <div class="sub" style="font-size:12px;margin-bottom:10px">세션 클릭 → 전체 대화 내용 확인</div>
        <div class="list" id="sess-list"></div>
      </div>
    </div>

    <div class="section">
      <h2>🎯 의뢰 전환 <span class="cnt" id="orders-count"></span></h2>
      <div class="list" id="orders-list"></div>
    </div>

    <div class="section">
      <h2>👍👎 피드백 <span class="cnt" id="fb-count"></span></h2>
      <div class="list" id="fb-list"></div>
    </div>
  </div>
</div>

<div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeSession()">
  <div class="modal">
    <h3><span id="m-title">세션 상세</span><button onclick="closeSession()">×</button></h3>
    <div id="m-messages"></div>
  </div>
</div>

<div id="answer-bg" class="modal-bg" onclick="if(event.target===this)closeAnswer()">
  <div class="modal answer-modal">
    <h3><span id="a-title">답변 작성</span><button onclick="closeAnswer()">×</button></h3>
    <div class="ans-order" id="a-order-info"></div>

    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--dark)">발송 채널</div>
    <div class="ch-tog">
      <label><input type="radio" name="ans-ch" value="hrer" checked><span>✉ HRer (hrer.kr 자동 발송)</span></label>
      <label><input type="radio" name="ans-ch" value="oneteam_manual"><span>📎 원팀커넥트 (복사 후 메일플러그 수동 발송)</span></label>
    </div>

    <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--dark)">답변 본문</div>
    <textarea id="a-body" class="ans-editor" placeholder="답변을 작성하세요. 줄바꿈은 그대로 유지됩니다. &#10;&#10;예:&#10;귀하께서 문의하신 수습 해고 건에 대하여 다음과 같이 회신드립니다.&#10;&#10;1. 사실관계&#10;...&#10;&#10;추가 문의사항이 있으시면 편하게 연락 주십시오.&#10;&#10;HRer 담당 공인노무사 드림"></textarea>

    <div class="ans-prev" id="a-prev"></div>
    <div class="ans-saved" id="a-saved"></div>
    <div class="ans-err" id="a-err"></div>

    <div class="ans-actions">
      <span class="hint" id="a-hint"></span>
      <button class="btn" onclick="closeAnswer()">취소</button>
      <button class="btn primary" id="a-submit" onclick="submitAnswer()">답변 전송 및 저장</button>
    </div>
  </div>
</div>

<script>
const TK_KEY = 'hrer_admin_token';
let TOKEN = null;

function escapeHTML(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(t){
  if (!t) return '-';
  const d = new Date(t);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function apiGet(view, extra=''){
  const q = new URLSearchParams({view, ...extra});
  const r = await fetch('/api/admin?' + q, {headers: {'X-Admin-Token': TOKEN}});
  if (r.status === 401){
    alert('인증 실패'); logout(); return null;
  }
  if (!r.ok){
    console.error('api fail', r.status);
    return null;
  }
  return await r.json();
}

async function login(){
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  const r = await fetch('/api/admin?view=overview', {headers: {'X-Admin-Token': t}});
  if (r.status === 401){
    document.getElementById('login-err').textContent = '토큰이 올바르지 않아요.';
    return;
  }
  if (!r.ok){
    document.getElementById('login-err').textContent = '서버 오류: ' + r.status;
    return;
  }
  TOKEN = t;
  try { sessionStorage.setItem(TK_KEY, t); } catch(e){}
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  refresh();
}
function logout(){
  TOKEN = null;
  try { sessionStorage.removeItem(TK_KEY); } catch(e){}
  document.getElementById('login').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

async function refresh(){
  const d = await apiGet('overview');
  if (!d) return;
  const s = d.sessions || [], m = d.misses || [], f = d.feedback || [], o = d.orders || [];

  document.getElementById('k-sessions').textContent = s.length;
  const handoffCount = s.filter(x=>x.handoff_to).length;
  document.getElementById('k-handoff').textContent = `${handoffCount} / ${s.length}`;
  document.getElementById('k-miss').textContent = m.length;
  document.getElementById('k-ai').textContent = m.filter(x=>x.ai_handled).length;
  // FAQ 매칭률 추정: 전체 세션 대비 매칭 실패 비율 역산은 부정확하여 생략, 단순 건수
  const faqPct = s.length ? Math.max(0, 100 - Math.round(m.length / Math.max(s.length,1) * 100)) : 0;
  document.getElementById('k-faq').textContent = faqPct + '%';

  // 매칭 실패
  document.getElementById('miss-count').textContent = `${m.length}건`;
  document.getElementById('miss-list').innerHTML = m.length
    ? m.slice(0,50).map(x => `<div class="item"><div class="q">${x.ai_handled?'<span class="b ai">AI</span>':'<span class="b">미답</span>'}${escapeHTML(x.query)}</div><div class="t">${fmtTime(x.created_at)}</div></div>`).join('')
    : '<div class="empty">아직 없음</div>';

  // 세션 리스트
  document.getElementById('sess-count').textContent = `${s.length}건`;
  document.getElementById('sess-list').innerHTML = s.length
    ? s.slice(0,50).map(x => {
        const handoff = x.handoff_to ? `<span class="b handoff">→ ${x.handoff_to}</span>` : '';
        const tok = (x.session_token||'').slice(-8);
        return `<div class="item" onclick="openSession('${escapeHTML(x.session_token)}')"><div class="q">${handoff}<code style="color:#6366F1">${tok}</code> · ${fmtTime(x.first_message_at)} 시작</div><div class="t">${fmtTime(x.last_message_at)}</div></div>`;
      }).join('')
    : '<div class="empty">아직 세션 없음</div>';

  // 의뢰 전환
  window._orders = o; // openAnswer에서 참조
  document.getElementById('orders-count').textContent = `${o.length}건`;
  document.getElementById('orders-list').innerHTML = o.length
    ? o.map(x => {
        const pay = x.payment_status === 'paid' ? '<span class="status ok">결제완료</span>' : '<span class="status warn">대기</span>';
        const ans = x.answered_at
          ? `<span class="status answered">✔ 답변완료 (${fmtTime(x.answered_at)})</span>`
          : '<span class="status pending-answer">✍ 답변대기</span>';
        const title = x.handoff_summary?.title || x.service;
        const sess = x.handoff_session ? `<code style="color:#6366F1;font-size:11px">${(x.handoff_session||'').slice(-8)}</code> ` : '';
        return `<div class="item" onclick="openAnswer('${escapeHTML(x.id)}')"><div class="q">${pay} ${ans} <b>${escapeHTML(x.service)}</b> ${x.tier?'('+x.tier+')':''} · ${sess}${escapeHTML(title)}</div><div class="t">${fmtTime(x.created_at)}</div></div>`;
      }).join('')
    : '<div class="empty">아직 의뢰 없음</div>';

  // 피드백
  document.getElementById('fb-count').textContent = `${f.length}건 (👍 ${f.filter(x=>x.up).length} / 👎 ${f.filter(x=>!x.up).length})`;
  document.getElementById('fb-list').innerHTML = f.length
    ? f.slice(0,50).map(x => {
        const b = x.up ? '<span class="b up">👍</span>' : '<span class="b down">👎</span>';
        return `<div class="item"><div class="q">${b}${escapeHTML(x.faq_id || '-')} <span style="color:#888;margin-left:8px">"${escapeHTML(x.query||'')}"</span></div><div class="t">${fmtTime(x.created_at)}</div></div>`;
      }).join('')
    : '<div class="empty">아직 없음</div>';
}

async function openSession(token){
  const d = await apiGet('session', {session: token});
  if (!d) return;
  const msgs = d.messages || [];
  document.getElementById('m-title').innerHTML = `세션 <code style="color:#6366F1">${token.slice(-8)}</code> · ${msgs.length}건 메시지`;
  document.getElementById('m-messages').innerHTML = msgs.length
    ? msgs.map(m => {
        const who = m.role === 'user' ? '고객' : '봇';
        const mode = m.mode ? `<span class="b ${m.mode==='faq'?'faq':m.mode==='ai'?'ai':m.mode==='escalate'?'esc':''}">${m.mode}</span>` : '';
        return `<div class="msg ${m.role}"><div class="who">${who} · ${fmtTime(m.created_at)} ${mode}</div>${escapeHTML(m.content).replace(/\n/g,'<br>')}</div>`;
      }).join('')
    : '<div class="empty">메시지가 없어요.</div>';
  document.getElementById('modal-bg').classList.add('on');
}
function closeSession(){
  document.getElementById('modal-bg').classList.remove('on');
}

let _currentOrderId = null;
async function openAnswer(orderId){
  const o = (window._orders||[]).find(x => x.id === orderId);
  if (!o){ alert('의뢰 정보를 찾을 수 없음'); return; }
  _currentOrderId = orderId;

  const pretty = {
    'consult':'노무 자문','unfair-dismissal':'부당해고 구제','investigation':'괴롭힘·성희롱 조사',
    'hr-evaluation':'인사평가 설계','employment-rules':'취업규칙 검토',
  }[o.service] || o.service;
  const tierLabel = o.tier === 'simple' ? '(간단)' : o.tier === 'deep' ? '(심층)' : o.tier === 'written' ? '(서면)' : '';
  const summaryText = (o.handoff_summary && (o.handoff_summary.summary || o.handoff_summary.title)) || '';
  const bullets = (o.handoff_summary && Array.isArray(o.handoff_summary.bullets)) ? o.handoff_summary.bullets : [];

  document.getElementById('a-title').textContent = `답변 작성 — ${pretty} ${tierLabel}`;

  // 자문봇 A 초안 영역 (있으면 표시, 없으면 안내 문구)
  const aiDraft = o.ai_draft || '';
  const aiCites = o.ai_citations || {};
  const aiModel = o.ai_model || '';
  const aiAt = o.ai_draft_at || '';
  const aiVerified = o.ai_verified || {};
  const aiTokens = (o.ai_input_tokens != null || o.ai_output_tokens != null)
    ? `토큰 ${o.ai_input_tokens||0}↓ ${o.ai_output_tokens||0}↑` : '';
  let aiBlock = '';
  if (aiDraft){
    const cites = [];
    if (aiCites.법령 && aiCites.법령.length) cites.push('법령 ' + aiCites.법령.length + '건');
    if (aiCites.판례 && aiCites.판례.length) cites.push('판례 ' + aiCites.판례.length + '건');
    if (aiCites.행정해석 && aiCites.행정해석.length) cites.push('행정해석 ' + aiCites.행정해석.length + '건');
    const unv = aiVerified.unverified_count || 0;
    aiBlock = `
      <div class="ai-draft-card">
        <div class="head">
          <span>🤖 자문봇 초안 (A) — 내부 참고용</span>
          <span class="meta">${escapeHTML(aiModel)} · ${fmtTime(aiAt)} · ${aiTokens}</span>
        </div>
        <div class="ai-body">${escapeHTML(aiDraft)}</div>
        <div class="ai-cites">
          <strong>자동 추출 인용:</strong> ${cites.join(' · ') || '없음'}
          ${unv ? ` · <span style="color:#DC2626;font-weight:700">⚠ 미확인 ${unv}건</span>` : ''}
        </div>
        <button type="button" onclick="useAIDraft()">📥 이 초안을 에디터로 복사</button>
      </div>
    `;
  } else {
    aiBlock = `
      <div class="ai-draft-card" style="background:#F3F4F6;border-color:#E5E7EB">
        <div class="ai-draft-empty">
          🤖 자문봇 초안은 아직 생성되지 않았습니다. (법인 완료 및 Claude API 연결 후 자동 생성됩니다)
        </div>
      </div>
    `;
  }

  document.getElementById('a-order-info').innerHTML = `
    <div class="row"><div class="k">의뢰번호</div><div><code style="color:#6366F1">${escapeHTML(o.id)}</code></div></div>
    <div class="row"><div class="k">의뢰인</div><div><strong>${escapeHTML(o.name||'-')}</strong> · ${escapeHTML(o.contact||'(이메일 없음)')}</div></div>
    <div class="row"><div class="k">회사</div><div>${escapeHTML(o.company||'미입력')}</div></div>
    <div class="row"><div class="k">결제</div><div>${o.payment_status === 'paid' ? `<span class="status ok">결제완료</span> ${o.amount?Number(o.amount).toLocaleString('ko-KR')+'원':''}` : `<span class="status warn">${escapeHTML(o.payment_status||'pending')}</span>`}</div></div>
    <div class="row"><div class="k">접수</div><div>${fmtTime(o.created_at)}</div></div>
    ${summaryText ? `<div class="row"><div class="k">챗봇 요약</div><div>${escapeHTML(summaryText)}</div></div>` : ''}
    ${bullets.length ? `<div class="row"><div class="k">핵심</div><div>${bullets.map(b=>'· '+escapeHTML(b)).join('<br>')}</div></div>` : ''}
    <div class="row"><div class="k">질문</div><div></div></div>
    <div class="ans-q">${escapeHTML(o.question||'(질문 내용 없음)')}</div>
    ${aiBlock}
    ${o.response_body ? `<div class="row" style="margin-top:14px"><div class="k">기존 답변</div><div style="color:var(--mint);font-weight:600">✔ ${fmtTime(o.answered_at)} (${escapeHTML(o.response_channel||'-')}) — 다시 작성 시 덮어씁니다</div></div><div class="ans-q" style="border-color:#BBF7D0;background:#F0FDF4">${escapeHTML(o.response_body).replace(/\n/g,'<br>')}</div>` : ''}
  `;

  // useAIDraft 전역 노출 (초안 복사 버튼용)
  window.__aiDraftText = aiDraft;

  // 기존 답변이 있으면 에디터에 로드
  document.getElementById('a-body').value = o.response_body || '';
  // 채널 기본값: 기존 답변이 있으면 그 채널, 아니면 hrer
  const defaultCh = o.response_channel || 'hrer';
  document.querySelectorAll('input[name="ans-ch"]').forEach(el => { el.checked = (el.value === defaultCh); });
  document.getElementById('a-saved').style.display = 'none';
  document.getElementById('a-err').style.display = 'none';
  document.getElementById('a-prev').style.display = 'none';
  document.getElementById('a-hint').textContent = o.contact ? `→ ${o.contact}` : '⚠ 이메일 주소 없음 (HRer 채널 불가)';
  document.getElementById('answer-bg').classList.add('on');
}

function closeAnswer(){
  document.getElementById('answer-bg').classList.remove('on');
  _currentOrderId = null;
}

function useAIDraft(){
  const draft = window.__aiDraftText || '';
  if (!draft){ alert('자문봇 초안이 없습니다.'); return; }
  const editor = document.getElementById('a-body');
  if (editor.value && editor.value.trim().length > 20){
    if (!confirm('현재 에디터에 작성 중인 내용을 덮어쓸까요?')) return;
  }
  editor.value = draft;
  editor.focus();
}

async function submitAnswer(){
  if (!_currentOrderId) return;
  const body = document.getElementById('a-body').value.trim();
  const channel = document.querySelector('input[name="ans-ch"]:checked').value;
  const errEl = document.getElementById('a-err');
  const okEl = document.getElementById('a-saved');
  const prevEl = document.getElementById('a-prev');
  errEl.style.display = 'none';
  okEl.style.display = 'none';
  prevEl.style.display = 'none';

  if (body.length < 20){
    errEl.textContent = '답변 본문이 너무 짧습니다. (20자 이상)';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('a-submit');
  btn.disabled = true;
  btn.textContent = channel === 'hrer' ? '발송 중…' : '저장 중…';

  try {
    // 원팀커넥트 수동: 먼저 클립보드 복사 (사용자 제스처 유효 시점)
    if (channel === 'oneteam_manual'){
      try { await navigator.clipboard.writeText(body); } catch(e){ /* 실패해도 계속 진행 */ }
    }

    const r = await fetch('/api/answer', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-Admin-Token': TOKEN},
      body: JSON.stringify({
        orderId: _currentOrderId,
        responseBody: body,
        channel,
        answeredBy: 'HRer',
      }),
    });
    const j = await r.json().catch(()=>({}));
    if (!r.ok){
      errEl.textContent = `실패: ${j.error || r.status} ${j.detail||j.message||''}`;
      errEl.style.display = 'block';
      return;
    }

    if (channel === 'hrer'){
      okEl.textContent = `✔ hrer.kr 명의 이메일 발송 완료. 답변이 DB에 저장되었습니다.`;
      okEl.style.display = 'block';
    } else {
      okEl.innerHTML = `✔ 답변이 DB에 저장되었습니다.<br>답변 본문은 클립보드에 복사되어 있어요. 메일플러그에서 붙여넣어 발송해 주세요.`;
      okEl.style.display = 'block';
    }

    // 3초 후 닫고 목록 새로고침
    setTimeout(() => { closeAnswer(); refresh(); }, 2500);
  } catch(e){
    errEl.textContent = `오류: ${e.message||e}`;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '답변 전송 및 저장';
  }
}

function exportJSON(){
  apiGet('overview').then(d => {
    if (!d) return;
    const blob = new Blob([JSON.stringify(d, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `hrer-bot-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
}

// 자동 로그인 (세션 저장된 경우)
(function autologin(){
  try {
    const saved = sessionStorage.getItem(TK_KEY);
    if (saved){
      document.getElementById('token-input').value = saved;
      login();
    }
  } catch(e){}
})();

// 5분마다 자동 새로고침
setInterval(()=>{ if (TOKEN) refresh(); }, 5*60*1000);
</script>
</body>
</html>
